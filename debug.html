<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>插件诊断</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
    .ok { color: #0f0; }
    .err { color: #f00; }
    pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>青幻工具箱 - 诊断工具</h1>
  <div id="output"></div>

  <script src="config.js"></script>
  <script>
    const output = document.getElementById('output');

    function log(msg, type = 'ok') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = msg;
      output.appendChild(div);
    }

    async function diagnose() {
      log('=== 开始诊断 ===');

      // 1. 检查 config.js
      try {
        log(`✓ config.js 加载成功: ${CONFIG.API_URL}`, 'ok');
      } catch (e) {
        log(`✗ config.js 加载失败: ${e.message}`, 'err');
      }

      // 2. 检查 Chrome Storage
      try {
        const data = await chrome.storage.local.get(['apiKey', 'sunoCookie', 'capturedAt']);
        log(`✓ Chrome Storage 读取成功`, 'ok');
        log(`  - API Key: ${data.apiKey ? '已保存 (' + data.apiKey.substring(0, 10) + '...)' : '未保存'}`, data.apiKey ? 'ok' : 'err');
        log(`  - Suno Cookie: ${data.sunoCookie ? '已保存 (长度: ' + data.sunoCookie.length + ')' : '未保存'}`, data.sunoCookie ? 'ok' : 'err');
        log(`  - 捕获时间: ${data.capturedAt || '无'}`, data.capturedAt ? 'ok' : 'err');

        // 检查 Cookie 内容
        if (data.sunoCookie) {
          const hasSession = data.sunoCookie.includes('__session');
          const hasClient = data.sunoCookie.includes('__client');
          log(`  - 包含 __session: ${hasSession}`, hasSession ? 'ok' : 'err');
          log(`  - 包含 __client: ${hasClient}`, hasClient ? 'ok' : 'err');
        }
      } catch (e) {
        log(`✗ Chrome Storage 读取失败: ${e.message}`, 'err');
      }

      // 3. 检查服务器连接
      if (CONFIG.API_URL) {
        try {
          const resp = await fetch(`${CONFIG.API_URL}/api/admin/keys`, {
            headers: { 'x-admin-token': 'test' }
          });
          log(`✓ 服务器可访问: ${CONFIG.API_URL} (HTTP ${resp.status})`, 'ok');
        } catch (e) {
          log(`✗ 服务器连接失败: ${e.message}`, 'err');
        }
      }

      // 4. 检查 popup.html 和 popup.js
      try {
        const popupResp = await fetch('popup.html');
        const popupHtml = await popupResp.text();
        log(`✓ popup.html 大小: ${popupHtml.length} 字节`, 'ok');

        const jsResp = await fetch('popup.js');
        const jsText = await jsResp.text();
        log(`✓ popup.js 大小: ${jsText.length} 字节`, 'ok');

        // 检查关键函数
        const hasInit = jsText.includes('async function init()');
        const hasShowScene = jsText.includes('function showScene(');
        const hasRenderDashboard = jsText.includes('function renderDashboard()');
        log(`  - init() 函数: ${hasInit}`, hasInit ? 'ok' : 'err');
        log(`  - showScene() 函数: ${hasShowScene}`, hasShowScene ? 'ok' : 'err');
        log(`  - renderDashboard() 函数: ${hasRenderDashboard}`, hasRenderDashboard ? 'ok' : 'err');
      } catch (e) {
        log(`✗ 文件检查失败: ${e.message}`, 'err');
      }

      log('=== 诊断完成 ===');
      log('');
      log('如果看到错误，请截图发给开发者');
    }

    diagnose();
  </script>
</body>
</html>
