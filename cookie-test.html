<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Suno Cookie 捕获测试工具</title>
  <link rel="stylesheet" href="cookie-test.css">
</head>
<body>
  <h1>🍪 Suno Cookie 捕获测试工具</h1>

  <div class="section">
    <h2>使用说明</h2>
    <ol>
      <li>确保你已经在 <strong>suno.com</strong> 登录</li>
      <li>点击下面的测试按钮</li>
      <li>查看测试结果，找出 Cookie 捕获的问题</li>
      <li>将结果截图或复制给开发者</li>
    </ol>
  </div>

  <div class="section">
    <h2>快速测试</h2>
    <button id="runAllBtn">🚀 运行所有测试</button>
    <button id="clearBtn">🗑️ 清空输出</button>
    <button id="copyBtn">📋 复制完整 Cookie</button>
  </div>

  <div class="section">
    <h2>分步测试</h2>
    <button id="test1Btn">测试 1: document.cookie</button>
    <button id="test2Btn">测试 2: Chrome Cookie API</button>
    <button id="test3Btn">测试 3: 触发网络请求</button>
    <button id="test4Btn">测试 4: 验证 Session</button>
    <button id="test5Btn">测试 5: 检查插件存储</button>
  </div>

  <div id="output"></div>

  <script src="cookie-test.js"></script>
</body>
</html>
